name: Publish to npm

# Triggered when a GitHub Release is published. Builds the package and publishes
# to npm using an automation token (NPM_TOKEN secret).
#
# Setup:
#   1. Create automation token: https://www.npmjs.com/settings/~/tokens
#      -> Generate new token -> Classic -> Automation
#   2. Add as repo secret: Settings -> Secrets and variables -> Actions
#      Name: NPM_TOKEN
#   3. Gated by "npm" environment reviewers.

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.1.0
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Verify version consistency (tag = package.json)
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Git tag:      $TAG (version: $TAG_VERSION)"
          echo "package.json: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Versions match: $TAG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
