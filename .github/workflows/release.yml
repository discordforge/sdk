name: Release

# Manual release trigger. Bumps version, commits, tags, and creates a GitHub Release.
# The Release event then triggers publish.yml which actually uploads to npm
# (gated by required reviewers on the "npm" environment).
#
# Usage:
#   Actions -> Release -> Run workflow
#     bump:           patch / minor / major  (ignored if custom_version is set)
#     custom_version: exact version like "1.1.1" or "2.0.0-rc.1" (leave empty to auto-bump)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (ignored if custom_version is set)'
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Exact version (e.g. 1.1.1). Leave empty to auto-bump.'
        required: false
        type: string

jobs:
  release:
    name: Bump, tag, and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4.1.0
        with:
          node-version: 22.x

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: version
        run: |
          set -e
          CURRENT=$(node -p "require('./package.json').version")
          BUMP="${{ inputs.bump }}"
          CUSTOM="${{ inputs.custom_version }}"

          NEW=$(node -e "
          const current = '$CURRENT';
          const bump = '$BUMP';
          const custom = '$CUSTOM'.trim();

          if (custom) {
            console.log(custom);
          } else {
            const parts = current.split('.');
            if (parts.length < 3) {
              console.error('Cannot auto-bump non-semver version:', current);
              process.exit(1);
            }
            let [major, minor, patch] = parts.map(Number);
            if (bump === 'major') { major += 1; minor = 0; patch = 0; }
            else if (bump === 'minor') { minor += 1; patch = 0; }
            else { patch += 1; }
            console.log(\`\${major}.\${minor}.\${patch}\`);
          }
          ")

          echo "Current: $CURRENT"
          echo "New:     $NEW"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1 || git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists. Pick a different version."
            exit 1
          fi
          echo "✓ Tag $TAG is free"

      - name: Update version in package.json (if different)
        id: update
        run: |
          NEW="${{ steps.version.outputs.version }}"
          CURRENT="${{ steps.version.outputs.current }}"

          if [ "$NEW" = "$CURRENT" ]; then
            echo "Version unchanged ($CURRENT). Skipping file bump - will tag current HEAD."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            # npm version uses --no-git-tag-version to update package.json + package-lock.json only
            npm version "$NEW" --no-git-tag-version
            echo "--- package.json ---"
            grep "\"version\"" package.json | head -1
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: steps.update.outputs.bumped == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git add package.json package-lock.json
          git commit -m "chore: release ${TAG}"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.9
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
